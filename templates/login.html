<!doctype html>
<html lang="vi">
<head>
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập – Giảng viên</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
  <link rel="icon" type="image/png" href="{% static 'assets/images/favicon.png' %}"/>

  <style>
    :root {
      --brand: #28c697;
      --radius: 16px;
    }
    body {
      font-family: "Inter", sans-serif;
      background-color: #f6f8fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .auth-container {
      display: flex;
      flex-direction: row;
      width: 100%;
      max-width: 1050px;
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 10px 35px rgba(0,0,0,.08);
      overflow: hidden;
    }

    /* LEFT: logo + form */
    .auth-left {
      flex: 1;
      padding: 50px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .auth-left img {
      max-width: 120px;
      margin-bottom: 20px;
    }
    .auth-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: #1f2937;
    }
    .auth-subtitle {
      color: #6b7280;
      margin-bottom: 24px;
    }
    .form-label {
      font-weight: 500;
      color: #374151;
    }
    .form-control:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 .2rem rgba(40,198,151,.18);
    }
    .btn-primary {
      background-color: var(--brand);
      border-color: var(--brand);
      font-weight: 500;
    }
    .btn-primary:hover {
      background-color: #22b285;
      border-color: #22b285;
    }
    .auth-footer {
      margin-top: 18px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    /* RIGHT: optional image background */
    .auth-right {
      flex: 1.1;
      background: url("{% static 'assets/images/2.png' %}") center/cover no-repeat;
    }
    @media (max-width: 992px) {
      .auth-container {
        flex-direction: column;
      }
      .auth-right {
        height: 180px;
      }
      .auth-left {
        padding: 36px 28px;
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <!-- LEFT: Giảng viên form -->
    <div class="auth-left">
      <img src="{% static 'assets/images/1.png' %}" alt="Logo">
      <h3 class="auth-title">Cổng thông tin nội bộ</h3>
      <p class="auth-subtitle">Hệ thống quản lý điểm danh – Giảng viên</p>

      <form action="#" method="post" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_staff" class="form-label">Mã giảng viên</label>
          <input type="text" class="form-control" id="id_staff" name="id_staff" placeholder="Nhập mã giảng viên">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Mật khẩu</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="••••••••">
        </div>

        {% if error_message %}
          <div class="alert alert-danger py-2">{{ error_message }}</div>
        {% endif %}

        <button type="submit" class="btn btn-primary w-100 py-2">Đăng nhập</button>
      </form>

      <div class="auth-footer">
        © {{ now|date:"Y" }} FaceByAttendance · All rights reserved
      </div>
    </div>

    <!-- RIGHT: Hình minh họa -->
    <div class="auth-right"></div>
  </div>

  <script src="{% static 'assets/js/jquery-3.3.1.min.js' %}"></script>
  <script src="{% static 'assets/js/bootstrap.min.js' %}"></script>
</body>
</html>
