<!doctype html>
<html lang="vi">
<head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ blog_post.title }} - Trường Đại học Kiến trúc Đà Nẵng</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/blog-theme.css' %}?v=2.0">
    <link rel="icon" type="image/png" href="{% static 'assets/images/favicon.png' %}"/>
    
    <style>
        /* Force override all existing styles */
        html, body {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%) !important;
            font-family: "Inter", sans-serif !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100vh !important;
            position: relative !important;
            overflow-x: hidden !important;
        }
        
        /* Override background image with Django static path */
        body::before {
            background-image: url("{% static 'assets/images/2.png' %}") !important;
            content: '' !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            opacity: 0.3 !important;
            z-index: -2 !important;
        }

        body::after {
            content: '' !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: linear-gradient(135deg, 
                rgba(220, 38, 38, 0.85) 0%, 
                rgba(185, 28, 28, 0.9) 50%,
                rgba(239, 68, 68, 0.8) 100%) !important;
            z-index: -1 !important;
        }
        
        /* Force main container styles */
        .main-container {
            background: transparent !important;
            min-height: 100vh !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 20px !important;
            position: relative !important;
            z-index: 1 !important;
        }

        .content-wrapper {
            width: 100% !important;
            max-width: 900px !important;
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(20px) !important;
            border-radius: 24px !important;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15) !important;
            overflow: hidden !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
        }

        .content-inner {
            padding: 50px 60px !important;
            max-height: 90vh !important;
            overflow-y: auto !important;
        }

        /* Remove any conflicting styles */
        * {
            box-sizing: border-box !important;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="content-wrapper">
            <div class="content-inner">
                <a href="{% url 'choose_login' %}" class="back-link">
                    ← Quay lại trang chủ
                </a>

                <article>
                    <header class="article-header">
                        <div class="article-meta">
                            <span class="article-type">{{ blog_post.get_type_display }}</span>
                            <span class="article-date">{{ blog_post.created_at|date:"d/m/Y H:i" }}</span>
                        </div>
                        <h1 class="article-title">{{ blog_post.title }}</h1>
                    </header>

                    <div class="article-content">
                        {{ blog_post.body|safe }}
                    </div>
                </article>

                <div class="article-footer">
                    <p>© {{ now|date:"Y" }} FaceByAttendance · Hệ thống quản lý điểm danh</p>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'assets/js/jquery-3.3.1.min.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap.min.js' %}"></script>
</body>
</html>
